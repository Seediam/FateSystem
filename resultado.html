<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden;">
    <div class="popup" style="display: block; position: relative; width: 90%; max-width: 400px; bottom: auto; left: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.9); border: 2px solid #555;">
        <div class="popup-header" style="justify-content: center; border-bottom: 1px solid #444; padding-bottom: 10px;">
            <h3 id="popup-title" style="color: #fff; font-size: 18px; margin: 0; text-transform: uppercase;">Resultado</h3>
        </div>
        <div id="popup-content" style="font-size: 22px; text-align: center; margin-top: 15px;"></div>
    </div>
    
    <script type="module">
        import OBR from "https://esm.sh/@owlbear-rodeo/sdk";

        function formatResult(value, sorte) {
            let cor = value <= 4 ? "res-falha" : value <= 10 ? "res-comum" : value <= 19 ? "res-incomum" : "res-critico";
            let sorteHtml = sorte > 0 ? `<sup class="sorte-mod">${sorte}</sup>` : "";
            return `<span class="${cor}">${value}</span>${sorteHtml}`;
        }

        OBR.onReady(() => {
            const params = new URLSearchParams(window.location.search);
            const dataStr = params.get('data');
            
            if (dataStr) {
                const data = JSON.parse(decodeURIComponent(dataStr));
                document.getElementById("popup-title").innerText = `Rolagem de ${data.playerName}`;
                
                let parts = [];
                if (data.results.forca.length > 0) parts.push(`🔴 ${data.results.forca.map(v => formatResult(v, data.sorteUsada)).join(", ")}`);
                if (data.results.magia.length > 0) parts.push(`🔵 ${data.results.magia.map(v => formatResult(v, data.sorteUsada)).join(", ")}`);
                if (data.results.agilidade.length > 0) parts.push(`🟣 ${data.results.agilidade.map(v => formatResult(v, data.sorteUsada)).join(", ")}`);
                
                document.getElementById("popup-content").innerHTML = parts.join(" <br><br> ");
            }

            // Fecha a janela sozinha após 6 segundos
            setTimeout(() => { OBR.modal.close("resultado-modal"); }, 6000);
        });
    </script>
</body>
</html>
