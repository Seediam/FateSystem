<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css?v=9">
    <style>
        @keyframes camera-shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-2px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
    </style>
</head>
<body style="background: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden;">
    
    <div id="popup-box" class="popup" style="display: block; position: relative; width: 90%; max-width: 400px; bottom: auto; left: auto; background: rgba(15, 15, 20, 0.98); box-shadow: 0 10px 40px rgba(0,0,0,0.9); border: 2px solid #555; padding: 20px; border-radius: 8px;">
        <div class="popup-header" style="justify-content: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px;">
            <h3 id="popup-title" style="color: #fff; font-size: 18px; margin: 0; text-transform: uppercase;">Resultado</h3>
        </div>
        <div id="popup-content" style="font-size: 20px; text-align: left; margin-top: 15px; font-weight: bold;"></div>
    </div>
    
    <script type="module">
        import OBR from "https://esm.sh/@owlbear-rodeo/sdk";

        // Converte cor Hex (#ff0000) para RGB (255, 0, 0) para o CSS da luz brilhar
        function hexToRgb(hex) {
            var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : "255, 215, 0"; // Ouro como falha
        }

        function formatResult(value, sorte) {
            let cor = value <= 4 ? "res-falha" : value <= 11 ? "res-comum" : value <= 19 ? "res-incomum" : "res-critico";
            let sorteHtml = sorte > 0 ? `<sup class="sorte-mod">${sorte}</sup>` : "";
            return `<span class="${cor}">${value}</span>${sorteHtml}`;
        }

        OBR.onReady(() => {
            const params = new URLSearchParams(window.location.search);
            const dataStr = params.get('data');
            
            if (dataStr) {
                const data = JSON.parse(decodeURIComponent(dataStr));
                document.getElementById("popup-title").innerText = `Rolagem de ${data.playerName}`;
                
                let parts = [];
                let teveCritico = false;

                const processarAtributo = (array, nome, classeCSS) => {
                    if (array.length > 0) {
                        parts.push(`<span class="${classeCSS}">${nome}:</span> ` + array.map(v => {
                            if (v >= 20) teveCritico = true;
                            return formatResult(v, data.sorteUsada);
                        }).join(", "));
                    }
                };

                processarAtributo(data.results.forca, "Força", "attr-forca");
                processarAtributo(data.results.magia, "Magia", "attr-magia");
                processarAtributo(data.results.agilidade, "Agilidade", "attr-agilidade");
                
                document.getElementById("popup-content").innerHTML = parts.join(" <br><br> ");

                const box = document.getElementById("popup-box");
                
                // Aplicação da cor do Grimório ou Dourado Padrão
                let corBase = data.auraColor || "#ffd700";
                let rgbCor = hexToRgb(corBase);

                if (teveCritico) {
                    // Injeta uma animação de CSS feita na hora com a cor do jogador
                    const style = document.createElement('style');
                    style.innerHTML = `
                        @keyframes dynamic-dramatic {
                            0% { box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
                            50% { box-shadow: 0 0 60px rgba(${rgbCor}, 0.8), inset 0 0 20px rgba(${rgbCor}, 0.3); }
                            100% { box-shadow: 0 0 30px rgba(${rgbCor}, 0.5); }
                        }
                        .custom-crit-anim {
                            animation: camera-shake 0.4s cubic-bezier(.36,.07,.19,.97) both, dynamic-dramatic 1s ease-out forwards;
                            border-color: ${corBase} !important;
                        }
                    `;
                    document.head.appendChild(style);
                    box.classList.add("custom-crit-anim");
                } else if (data.auraColor) {
                    // Se não for crítico, mas tiver aura, aplica um brilho suave constante
                    box.style.boxShadow = `0 0 30px rgba(${rgbCor}, 0.3)`;
                    box.style.borderColor = corBase;
                }
            }

            setTimeout(() => { OBR.modal.close("resultado-modal"); }, 6000);
        });
    </script>
</body>
</html>
