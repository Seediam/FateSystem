<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fate Dice Roller</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="panel-header">
        <h1>Rolagem de Dados - Fate System</h1>
        <p class="subtitle">Configure por atributo e envie para todos os players.</p>
      </header>

      <section class="panel-card">
        <h2>Atributos</h2>
        <div id="attributes" class="attributes"></div>
      </section>

      <section class="panel-card">
        <h2>Sorte (sem rolagem)</h2>
        <p class="help">Cada uso de sorte adiciona +1 ao maior dado do atributo escolhido.</p>
        <div class="luck-row">
          <label for="luckPool">Pontos de sorte</label>
          <input id="luckPool" type="number" min="0" value="0" />
        </div>
      </section>

      <button id="rollButton" class="roll-button">Rolar Dados</button>
    </main>

    <div id="resultModal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h2>Resultado da Rolagem</h2>
            <div id="resultMeta" class="result-meta"></div>
          </div>
          <button id="closeModal" class="icon-button" aria-label="Fechar">✕</button>
        </div>
        <div id="resultList" class="result-list"></div>
        <div id="resultTotal" class="result-total"></div>
        <button id="closeModalFooter" class="close-button">Fechar</button>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
