<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>FateSystem Dice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h2>Ficha de Rolagem</h2>
        
        <div class="attr-row">
            <span class="attr-forca">Força</span>
            <div class="controls">
                <button onclick="changeCount('forca', -1)">-</button>
                <span id="count-forca">0</span>
                <button onclick="changeCount('forca', 1)">+</button>
            </div>
        </div>

        <div class="attr-row">
            <span class="attr-magia">Magia</span>
            <div class="controls">
                <button onclick="changeCount('magia', -1)">-</button>
                <span id="count-magia">0</span>
                <button onclick="changeCount('magia', 1)">+</button>
            </div>
        </div>

        <div class="attr-row">
            <span class="attr-agilidade">Agilidade</span>
            <div class="controls">
                <button onclick="changeCount('agilidade', -1)">-</button>
                <span id="count-agilidade">0</span>
                <button onclick="changeCount('agilidade', 1)">+</button>
            </div>
        </div>

        <hr>

        <div class="attr-row">
            <span>Sorte (Modificador)</span>
            <div class="controls">
                <button onclick="changeSorte(-1)">-</button>
                <span id="count-sorte">0</span>
                <button onclick="changeSorte(1)">+</button>
            </div>
        </div>

        <div class="grimorio-section">
            <span class="grimorio-title">Seus Grimórios (Auto-Salvo)</span>
            <div class="grimorio-creator">
                <input type="text" id="grim-nome" placeholder="Nome do Elemento" maxlength="20">
                <input type="color" id="grim-cor" value="#ff0000" title="Cor da Aura">
                <button onclick="addGrimorio()">+</button>
            </div>
            <select id="sel-grimorio">
                <option value="">Nenhum Grimório Selecionado</option>
            </select>
        </div>

        <button id="btn-rolar" class="roll-btn">Rolar Dados</button>

        <div class="historico-header">
            <span>Histórico da Sessão</span>
            <button onclick="limparHistorico()" class="btn-lixeira" title="Apagar Histórico">🗑️</button>
        </div>
        <div id="historico" class="historico-container"></div>
    </div>

    <audio id="som-dado" src="dado.mp3" preload="auto"></audio>
    <audio id="som-critico" src="critico.mp3" preload="auto"></audio>

    <script type="module" src="script.js?v=7"></script>
    <script>
        let counts = { forca: 0, magia: 0, agilidade: 0 };
        let sorte = 0;
        let grimoires = JSON.parse(localStorage.getItem('fatesystem_grimoires')) || [];

        function changeCount(attr, val) {
            counts[attr] = Math.max(0, counts[attr] + val);
            document.getElementById(`count-${attr}`).innerText = counts[attr];
        }

        function changeSorte(val) {
            sorte = Math.max(0, sorte + val);
            document.getElementById('count-sorte').innerText = sorte;
        }

        function renderGrimoires() {
            const sel = document.getElementById('sel-grimorio');
            sel.innerHTML = '<option value="">Nenhum Grimório Selecionado</option>';
            grimoires.forEach((g, index) => {
                sel.innerHTML += `<option value="${index}">${g.nome}</option>`;
            });
        }

        function addGrimorio() {
            const nome = document.getElementById('grim-nome').value.trim();
            const cor = document.getElementById('grim-cor').value;
            if (!nome) return;
            grimoires.push({ nome, cor });
            localStorage.setItem('fatesystem_grimoires', JSON.stringify(grimoires));
            document.getElementById('grim-nome').value = '';
            renderGrimoires();
        }

        function limparHistorico() {
            document.getElementById('historico').innerHTML = '';
        }

        // Carrega os grimórios salvos ao abrir a ficha
        renderGrimoires();
    </script>
</body>
</html>
